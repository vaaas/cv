<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml' xml:lang='en' lang='en'>
<head>
	<meta charset='utf-8'/>
	<style>
		/* basic */
		:root {
			--gray: #888;
			--semi: #666;
		}

		html {
			font-size: 4mm;
			margin: auto;
			width: 210mm;
			line-height: 1.5em;
			font-family: serif;
		}

		body { margin: 15mm; }

		section, footer { color: var(--semi); }

		section header {
			font-weight: bold;
			color: #000;
		}

		ul {
			margin: 0;
			padding-left: 1rem;
		}

		/* header */
		body > header {
			padding-bottom: 1rem;
			border-bottom: 1px solid var(--gray);
		}

		body > header h1 {
			font-size: 2rem;
			margin: 0;
			line-height: 1.5em;
		}

		body > header h2 {
			font-size: 1.50rem;
			font-weight: normal;
			margin: 0;
			line-height: 1.5em;
			color: var(--semi);
		}

		body > header nav {
			float: right;
			cursor: pointer;
			color: var(--gray);
			line-height: 1.5em;
		}

		body > header nav *:hover { text-decoration: underline; }
		body > header nav *+* { margin-left: 1em; }

		/* main */
		main { display: flex; }
		main > section { padding-top: 1rem; }
		main section:first-child { flex: 1; }
		main section:last-child { flex: 1.8; }

		/* sidebar */
		.sidebar {
			padding-right: 0.5rem;
			padding-bottom: 1rem;
			margin-right: 1rem;
			border-right: 1px solid var(--gray);
		}

		.sidebar > section + section { margin-top: 2rem; }
		.info > header:first-child { margin-bottom: 0.5rem; }

		:is(.buzzwords, .languages) div span {
			display: inline-block;
			width: 7em;
		}

		.sidebar > section > header:first-child {
			font-size: 1.25rem;
			line-height: 1.5em;
		}

		/* xp */
		.xp section + section { margin-top: 0.5rem; }
		.xp > section + section { margin-top: 2rem; }

		.xp > section > header:first-child {
			font-size: 1.25rem;
			margin-bottom: 1rem;
		}

		/* footer */
		footer {
			border-top: 1px solid var(--gray);
			padding-top: 1rem;
		}

		/* media queries */
		@media print {
			header nav { display: none; }
			footer {
				position: absolute;
				bottom: 0mm;
				font-style: italic;
			}
		}
	</style>
	<script>
		'use strict'

		function E(x) {
			if (!Array.isArray(x))
				return document.createTextNode(''+x)
			const [name, attrs, children] = x
			const elem = document.createElement(name)
			if (attrs)
				for (const [k, v] of Object.entries(attrs)) elem[k] = v
			if (children)
				for (const x of children)
					elem.appendChild(E(x))
			return elem
		}

		const VARS = {
			en: {
				full_name: 'Vasileios Pasialiokis',
				job_title: 'Full stack developer',
				blurb: "I'm a software developer and system administrator specialising in high scalability web services and software sensitive to performance. I'm fluent in node.js, Python, and PHP in functional style. My tools of the trade are Emacs and a UNIX shell.",
				tech_knowledge: 'Proficient in',
				buzzwords: [ 'Javascript', 'PHP', 'bash', 'SQL', 'Linux', 'Vue', 'Laravel', 'Lisp', 'Python', 'CSS', 'HTML', 'Git', 'Purescript', 'Ruby' ],
				language_knowledge: 'Languages',
				languages: [ 'English', 'Greek', 'Japanese' ],
				skills_heading: 'Skills',
				skills: [ 'Software development', 'System administration', 'Translation' ],
				info_heading: 'Information',
				xp_heading: 'Experience',
				education_heading: 'Education',
				info: {
					'Phone': '+30 695 501 8104',
					'Email': 'pasivasi@outlook.com',
					'Github': 'github.com/vaaas',
				},
				footer: 'This document is available online: ',
				link: 'https://vaaas.github.io/cv/',
				education: {
					'Aristotle University of Thessaloniki': 'Studied as an Electrical & Computer Engineer',
					'Certificate of Proficiency in English': 'Cambridge',
				},
				xp: [
					{
						where: 'Doppler SA',
						from: 'June 2020',
						to: 'Now',
						stack: 'PHP & Laravel, JS & Vue',
						what: [
							'Architected a continuous integration system',
							'Developed a web platform for internal accounting utilities',
							'Developed an order automation tool in collaboration with domain experts',
							'Developed a business intelligence tool',
							'Virtualised a legacy system for hosting on a web platform',
							'Mentoring of new employees in modern Linux web development',
							'Data analysis & requirements gathering',
							'Security hardening',
						],
					},
					{
						where: 'Organization for Transformative Works',
						from: 'August 2015',
						to: '2021',
						stack: 'Wordpress, Ruby on Rails, JS & jQuery',
						what: [
							'Translation of documentation, legal text, newsletter contents, and support tickets between Greek and English',
							'Founded and coordinated the Greek translation team',
							'Content management through Wordpress',
							'Wrangling of tag and metadata ontologies on user content',
							'User interface programming',
						],
					},
				],
			},

			el: {
				full_name: 'Βασίλειος Πασιαλιώκης',
				job_title: 'Προγραμματιστής λογισμικού (full stack)',
				blurb: "Είμαι προγραμματιστής λογισμικού και διαχειριστής συστημάτων με εξειδίκευση σε υπηρεσίες ιστού με μεγάλες ανάγκες κλίμακας και επιδόσεων. Γνωρίζω άριστα τα node.js, Python, και PHP με συναρτησιακό στυλ. Τα εργαλεία μου είναι το Emacs και το περιβάλλον UNIX.",
				birth_year_heading: 'Έτος γέννησης',
				birth_year: '1992',
				military_heading: 'Στρατιωτικές Υποχρεώσεις',
				military: 'Εκπληρωμένες',
				tech_knowledge: 'Γνώσεις',
				buzzwords: [ 'Javascript', 'PHP', 'bash', 'SQL', 'Linux', 'Vue', 'Laravel', 'Lisp', 'Python', 'CSS', 'HTML', 'Git', 'Purescript', 'Ruby' ],
				language_knowledge: 'Γλώσσες',
				languages: [ 'Αγγλικά', 'Ελληνικά', 'Ιαπωνικά' ],
				skills_heading: 'Δεξιότητες',
				skills: [ 'Ανάπτηξη λογισμικού', 'Διαχείρηση συστημάτων', 'Μετάφραση' ],
				info_heading: 'Πληροφορίες',
				xp_heading: 'Εμπειρία',
				education_heading: 'Σπουδές',
				info: {
					'Phone': '+30 695 501 8104',
					'Email': 'pasivasi@outlook.com',
					'Github': 'github.com/vaaas',
				},
				footer: 'Αυτό το έγγραφο διατίθεται και online: ',
				link: 'https://vaaas.github.io/cv/',
				education: {
					'Αριστοτέλειο Πανεπιστήμιο Θεσσαλονίκης': 'Τελειόφοιτος Τμήματος Ηλεκτρολόγων Μηχανικών &a Μηχανικών Υπολογιστών',
					'Certificate of Proficiency in English': 'Cambridge',
				},
				xp: [
					{
						where: 'Doppler SA',
						from: 'Ιούνιος 2020',
						to: 'Τώρα',
						stack: 'PHP & Laravel, JS & Vue, Ubuntu Linux',
						what: [
							'Αρχιτεκτόνηση συστήματος continuous integration',
							'Ανάπτηξη εσωτερικών λογιστικών εργαλείων σε πλατφόρμα ιστού',
							'Ανάπτηξη εργαλείου αυτόματης παραγγελιοληψίας σε συνεργασία με ειδικούς στον τομέα τους',
							'Ανάπτηξη εργαλείου business intelligence',
							'Μεταφορά παλαιού συστήματος σε εικονικές μηχανές προς εξωτερική φιλοξενία',
							'Ανάλυση δεδομένων & συλλογή αναγκών πελατών',
							'Διαχείρηση συστημάτων και ψηφιακής ασφάλειας',
						],
					},
					{
						where: 'Organization for Transformative Works',
						from: 'Αύγουστος 2015',
						to: '2021',
						stack: 'Wordpress, Ruby on Rails, JS & jQuery',
						what: [
							'Μετάφραση οδηγιών χρήστη, νομικού κειμένου, αναρτήσεων, και αιτημάτων χρηστών μεταξύ αγγλικών και ελληνικών',
							'Ίδρυση και συντονισμός της ελληνικής μεταφραστικής ομάδας',
							'Διαχείρηση υλικού μέσω πλατφόρμας Wordpress',
							'Οργάνωση οντολογίας μεταδεδομένων υλικού χρηστών',
							'Προγραμματισμός διεπαφής χρήστη',
						],
					},
				],
			},
		}

		let lang = 'en'

		function sidebar(TL) {
			return ['section', { className: 'sidebar' }, [
				['section', { className: 'info' }, [
					['header', null, [ 'Information' ]],

					['p', null, [TL.blurb]],

					...(lang === 'el' ?
						[
							['header', null, [ TL.birth_year_heading ]],
							['div', null, [ TL.birth_year ]],

							['header', null, [ TL.military_heading ]],
							['div', null, [ TL.military ]],
						] :
						['']),

					...Object.entries(TL.info)
					.map(x => [
						['header', null, [ x[0] ]],
						['div', null, [ x[1] ]],
					])
					.flat()
				]],

				['section', { className: 'skills' }, [
					['header', null, [ TL.skills_heading ]],
					...TL.skills.map(x => ['div', null, [ x ]])
				]],

				['section', { className: 'buzzwords' }, [
					['header', null, [ TL.tech_knowledge ]],
					['div', null, TL.buzzwords.map(x => ['span', null, [ x, ' ' ]])]
				]],

				['section', { className: 'languages' }, [
					['header', null, [ TL.language_knowledge ]],
					['div', null, TL.languages.map(x => ['span', null, [ x, ' ']])],
				]],
			]]
		}

		function XP(TL) {
			return ['section', { className: 'xp' }, [
				['section', { className: 'experience' }, [
					['header', null, [ TL.xp_heading, ]],
					...TL.xp.map(x => ['section', null, [
						['header', null, [ x.where ]],
						['div', null, [
							['em', null, [ x.from, ' — ', x.to ]]
						]],
						['div', null, [ 'Stack: ', x.stack, ]],
						['ul', null, x.what.map(x => ['li', null, [ x ]])]
					]]),
				]],

				['section', { className: 'education' }, [
					['header', null, [ TL.education_heading ]],
					...Object.entries(TL.education)
						.map(x => ['section', null, [
							['header', null, [ x[0] ]],
							['div', null, [ x[1] ]],
						]])
				]],
			]]
		}

		function render_body() {
			const TL = VARS[lang]

			return E(
				['body', null, [
					['header', null, [
						['nav', null, Object.keys(VARS).map(x =>
							['span', { onclick: () => { lang = x ; replace_body() } }, [ x.toUpperCase() ]])
						],
						['h1', null, [TL.full_name]],
						['h2', null, [TL.job_title]],
					]],

					['main', null, [
						sidebar(TL),
						XP(TL),
					]],
				['footer', null, [ TL.footer, TL.link]],
			]])
		}

		function replace_body() {
			document.title = VARS[lang].full_name
			document.firstElementChild.replaceChild(render_body(), document.body)
		}

		window.onload = replace_body
	</script>
</head>

<body/>
</html>
